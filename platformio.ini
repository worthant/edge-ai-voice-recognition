; PlatformIO Project Configuration File
;
; To switch which trained model is flashed, change custom_model_slug below.
; Slug format: <base>_<qat|ptq>, e.g. f172_b6_qat, f176_b2_ptq.
; Then run (in nn/):
;     python -m export_to_c --slug <MODEL_SLUG>     # one model
;     python -m export_to_c --all                   # every model in merged_runs/
; this writes nn/results/merged_runs/<MODEL_SLUG>/model_data.{c,h} which
; CMakeLists.txt picks up.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
upload_speed = 115200

; Switch this to use a different trained run.
; Must match a slug from nn/runs.py (and that run must have been exported).
custom_model_slug = f104_b5_ptq

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSE_CUSTOM_KWS=1
  -DRUN_SELFTEST=1
  -DBOARD_HAS_PSRAM=1
  -DMODEL_SLUG_BUILD=\"${this.custom_model_slug}\"
