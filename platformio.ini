; PlatformIO Project Configuration File
;
; To switch which trained model is flashed, change MODEL_SLUG below.
; Then run:
;     python -m export_to_c --slug <MODEL_SLUG>
; this writes nn/results/runs/<MODEL_SLUG>/model_data.{c,h} which the
; CMakeLists.txt picks up.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = partitions.csv

; Switch this to use a different trained run.
; Must match a slug from nn/runs.py (and that run must have been exported).
custom_model_slug = f172_b6_qat

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSE_CUSTOM_KWS=1
  -DRUN_SELFTEST=1
  -DBOARD_HAS_PSRAM=1
  -DMODEL_SLUG_BUILD=\"${this.custom_model_slug}\"
